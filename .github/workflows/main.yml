name: CloudSync CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore taskmaster/taskmaster.csproj

    - name: Build
      run: dotnet build taskmaster/taskmaster.csproj --no-restore --configuration Release

    - name: Test
      run: dotnet test taskmaster/taskmaster.csproj --no-build --verbosity normal
      continue-on-error: true

